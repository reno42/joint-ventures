  body { background: #000; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; overflow-x: hidden; }

  /* NAV */
  nav { position: relative; z-index: 20; padding: 24px; }
  .nav-inner { border-radius: 9999px; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; max-width: 80rem; margin: 0 auto; width: 100%; }
  .nav-left { display: flex; align-items: center; }
  .logo-area { display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 600; font-size: 1.125rem; cursor: pointer; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), text-shadow 0.3s ease; }
  .logo-area:hover { transform: scale(1.05); text-shadow: 0 0 12px rgba(255,255,255,0.6); }

  /* METRICS */

  .metric-card { border-radius: 16px; padding: 28px; text-align: center; }

  /* OBJECTIONS */
  .objection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
  .objection-card { border-radius: 16px; padding: 28px; }
  .objection-card .q { font-size: 0.95rem; font-weight: 600; color: #f59e0b; margin-bottom: 12px; }
  .objection-card .a { font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.7; }

  /* DISTRIBUTION */
  .dist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .dist-card { border-radius: 16px; padding: 28px; text-align: center; }
  .dist-card .dist-icon { font-size: 2rem; margin-bottom: 12px; }
  .dist-card h4 { font-family: 'Instrument Serif', serif; font-size: 1.1rem; margin-bottom: 6px; }
  .dist-card p { font-size: 0.8rem; color: rgba(255,255,255,0.45); line-height: 1.5; }

  /* GAPS */
  .gap-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
  .gap-item { border-radius: 16px; padding: 24px; display: flex; gap: 16px; }
  .gap-num { font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: rgba(255,255,255,0.15); min-width: 36px; }
  .gap-item h4 { font-size: 0.95rem; margin-bottom: 6px; }
  .gap-item p { font-size: 0.85rem; color: rgba(255,255,255,0.45); line-height: 1.5; }

  /* PRICING */
  .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .pricing-card { border-radius: 16px; padding: 32px; }
  .pricing-card h4 { font-family: 'Instrument Serif', serif; font-size: 1.2rem; margin-bottom: 4px; }
  .pricing-card .who { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
  .pricing-card .amount { font-family: 'Instrument Serif', serif; font-size: 2rem; }
  .pricing-card .unit { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

  /* PITCH */
  .pitch-card { border-radius: 20px; padding: 48px; max-width: 800px; margin: 0 auto; }
  .pitch-card .quote { font-family: 'Instrument Serif', serif; font-size: 1.3rem; line-height: 1.8; color: rgba(255,255,255,0.85); }
  .pitch-card .quote strong { color: #fff; }
  .pitch-card .quote .accent { color: #10b981; }

  /* CTA */
  .cta-section { text-align: center; padding: 140px 24px; }

  .cta-section p { color: rgba(255,255,255,0.5); font-size: 1.1rem; max-width: 500px; margin: 0 auto 36px; }

  /* DIVIDER */
  .section-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); max-width: 80rem; margin: 0 auto; }

  @media (max-width: 768px) {

</style>

<div id="root"></div>
<script>
const { useRef, useEffect, useState } = React;
const h = React.createElement;

/* ── SVG Icons ── */
function IconGlobe({ size = 24 }) {
  return h('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
    h('circle', { cx: 12, cy: 12, r: 10 }),
    h('line', { x1: 2, y1: 12, x2: 22, y2: 12 }),
    h('path', { d: 'M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z' })
  );
}
function IconArrowRight({ size = 20 }) {
  return h('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
    h('line', { x1: 5, y1: 12, x2: 19, y2: 12 }),
    h('polyline', { points: '12 5 19 12 12 19' })
  );
}
function IconInstagram({ size = 20 }) {
  return h('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
    h('rect', { x: 2, y: 2, width: 20, height: 20, rx: 5, ry: 5 }),
    h('path', { d: 'M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z' }),
    h('line', { x1: 17.5, y1: 6.5, x2: 17.51, y2: 6.5 })
  );
}
function IconTwitter({ size = 20 }) {
  return h('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
    h('path', { d: 'M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z' })
  );
}

/* ── Video Background Component ── */
function VideoBG() {
  const videoRef = useRef(null);
  const fadingOutRef = useRef(false);
  const rafRef = useRef(null);

  function cancelFade() { if (rafRef.current !== null) { cancelAnimationFrame(rafRef.current); rafRef.current = null; } }
  function animateFade(target, duration, onDone) {
    cancelFade();
    const video = videoRef.current;
    if (!video) return;
    const start = video.style.opacity !== '' ? parseFloat(video.style.opacity) : 1;
    const startTime = performance.now();
    const delta = target - start;
    function step(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
      video.style.opacity = String(start + delta * eased);
      if (progress < 1) { rafRef.current = requestAnimationFrame(step); } else { rafRef.current = null; onDone && onDone(); }
    }
    rafRef.current = requestAnimationFrame(step);
  }

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    video.style.opacity = '0';
    function handleCanPlay() { fadingOutRef.current = false; animateFade(1, 500); }
    function handleTimeUpdate() { if (!video.duration) return; const remaining = video.duration - video.currentTime; if (remaining <= 0.55 && !fadingOutRef.current) { fadingOutRef.current = true; animateFade(0, 500); } }
    function handleEnded() { video.style.opacity = '0'; setTimeout(() => { fadingOutRef.current = false; video.currentTime = 0; video.play().catch(() => {}); animateFade(1, 500); }, 100); }
    video.addEventListener('canplay', handleCanPlay, { once: true });
    video.addEventListener('timeupdate', handleTimeUpdate);
    video.addEventListener('ended', handleEnded);
    return () => { cancelFade(); video.removeEventListener('canplay', handleCanPlay); video.removeEventListener('timeupdate', handleTimeUpdate); video.removeEventListener('ended', handleEnded); };
  }, []);

  return h('div', { className: 'video-wrap' },
    h('video', { ref: videoRef, className: 'hero-video', autoPlay: true, muted: true, playsInline: true, loop: false, src: 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4', style: { opacity: '0' } })
  );
}

/* ── Glass Section Divider ── */
function Divider() { return h('div', { className: 'section-divider' }); }

/* ── App ── */
function App() {
  const [activeTab, setActiveTab] = useState('leads');

  return h('div', null,

    /* ── HERO ── */
    h('div', { className: 'page-wrap' },
      h(VideoBG),
      h('div', { className: 'overlay' }),
      h('nav', null,
        h('div', { className: 'nav-inner liquid-glass' },
          h('div', { className: 'nav-left' },
            h('div', { className: 'logo-area' },
              h(IconGlobe, { size: 24 }),
              h('span', null, 'IA × Ciencia')
            ),
            h('div', { className: 'nav-links' },
              h('a', { className: 'nav-link', href: '#ecosistema' }, 'Ecosistema'),
              h('a', { className: 'nav-link', href: '#modelos' }, 'Modelos'),
              h('a', { className: 'nav-link', href: '#playbooks' }, 'Playbooks'),
              h('a', { className: 'nav-link', href: '#pitch' }, 'Pitch')
            )
          ),
          h('div', { className: 'nav-right' },
            h('a', { className: 'cta-btn', href: '#modelos' }, 'Ver bootcamps')
          )
        )
      ),
      h('div', { className: 'hero-content' },
        h('p', { className: 'section-label', style: { marginBottom: '20px' } }, '⚡ De la investigación al producto'),
        h('h1', { className: 'hero-heading' }, 'El puente que falta entre', h('br'), h('em', null, 'ciencia argentina'), ' y', h('br'), 'productos de IA'),
        h('p', { className: 'hero-subtitle' }, 'Argentina produce científicos de clase mundial. Lo que no produce es el camino para convertir esa investigación en productos de inteligencia artificial que generen impacto y revenue.'),
        h('div', { style: { marginTop: '32px', display: 'flex', gap: '12px', justifyContent: 'center', flexWrap: 'wrap' } },
          h('a', { className: 'cta-btn', href: '#modelos' }, 'Ver modelos de bootcamp'),
          h('a', { className: 'cta-btn', href: '#pitch', style: { background: 'transparent', color: '#fff', border: '1px solid rgba(255,255,255,0.2)' } }, 'Ver pitch para Mara')
        ),
        h('div', { className: 'hero-stats' },
          h('div', { className: 'hero-stat' }, h('div', { className: 'number' }, '30%'), h('div', { className: 'label' }, 'Deep tech LatAm\nviene de Argentina')),
          h('div', { className: 'hero-stat' }, h('div', { className: 'number' }, '$585M+'), h('div', { className: 'label' }, 'Financiamiento total\nstartups argentinas')),
          h('div', { className: 'hero-stat' }, h('div', { className: 'number' }, '12'), h('div', { className: 'label' }, 'Unicornios\nproducidos')),
          h('div', { className: 'hero-stat' }, h('div', { className: 'number' }, '0'), h('div', { className: 'label' }, 'Programas ciencia\n→ producto IA'))
        )
      )
    ),

    /* ── ECOSYSTEM ── */
    h('section', { id: 'ecosistema', style: { background: '#000' } },
      h('div', { className: 'section-container' },
        h('div', { className: 'section-label' }, 'El ecosistema actual'),
        h('div', { className: 'section-title' }, 'Lo que Argentina ya tiene'),
